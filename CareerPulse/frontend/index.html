<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerPulse - Login</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center min-vh-100 fade-in">

  <div id="loading" class="loading-overlay hidden">
    <div class="premium-loader">
      <div></div><div></div><div></div><div></div>
    </div>
    <div class="loading-text overlay-text">Authenticating...</div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="glass-card p-4 p-md-5 mt-4 mt-md-5">
          <div class="text-center mb-5">
            <div class="mb-4 d-inline-block p-4 rounded-circle bg-primary-subtle text-primary">
              <i class="fas fa-briefcase fa-3x"></i>
            </div>
            <h2 class="fw-bold mb-1">CareerPulse</h2>
            <p class="text-muted">Professional Application Tracker</p>
          </div>

          <form id="authForm">
            <div class="mb-4">
              <label for="email" class="form-label fw-semibold small text-uppercase mb-2">Email address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control ps-3" id="email" required placeholder="name@example.com">
              </div>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold small text-uppercase mb-2">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control ps-3" id="password" required placeholder="Enter password">
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 mb-4" id="authBtn">Login</button>
            <div class="text-center pt-3 border-top">
              <a href="#" id="toggleAuth" class="text-decoration-none fw-bold text-primary">Need an
                account? Sign up</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive"
      aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
          aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    // Specific logic for index.html
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>

</html>
