<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerPulse - My Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="fade-in">

  <div id="loading" class="loading-overlay hidden">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg navbar-light glass-card mb-4" style="border-radius: 0; border-top: none; border-left: none; border-right: none;">
    <div class="container">
      <a class="navbar-brand fw-bold" href="dashboard.html" style="color: var(--primary-color);">
        <i class="fas fa-briefcase"></i> CareerPulse
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Tracker</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="find-jobs.html">Find Jobs</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="find-companies.html">Find Companies</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="mock-interview.html">Voice Interview</a>
          </li>
        </ul>
        <ul class="navbar-nav flex-row align-items-center mt-3 mt-lg-0">
          <li class="nav-item me-3">
            <button class="btn btn-outline-secondary btn-sm" id="toggleDarkMode">
              <i class="fas fa-moon"></i>
            </button>
          </li>
          <li class="nav-item dropdown ms-2">
            <a class="nav-link dropdown-toggle d-flex align-items-center p-0 active" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
                <i class="fas fa-user"></i>
              </div>
            </a>
            <ul class="dropdown-menu dropdown-menu-end glass-card border-0 shadow mt-2" aria-labelledby="profileDropdown">
              <li><a class="dropdown-item py-2 fw-bold" href="account.html"><i class="fas fa-user-circle me-2"></i> My Account</a></li>
              <li><a class="dropdown-item py-2" href="saved-jobs.html"><i class="fas fa-bookmark me-2"></i> Saved Jobs</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item py-2 text-danger" href="#" id="dropdownLogoutBtn"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="glass-card p-4">
          <h4 class="mb-4 text-primary fw-bold"><i class="fas fa-user-circle me-2"></i> My Account</h4>
          <form id="accountForm">
            <div class="mb-3 text-center">
              <div class="rounded-circle bg-primary text-white d-inline-flex justify-content-center align-items-center mb-3 shadow-sm" style="width: 80px; height: 80px; font-size: 2rem;">
                <i class="fas fa-user"></i>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="accEmail" readonly>
              <div class="form-text">Your email address cannot be changed.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="accName" placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label class="form-label">Preferred Role</label>
              <input type="text" class="form-control" id="accRole" placeholder="e.g. Frontend Developer">
            </div>
            <hr class="my-4">
            <h6 class="mb-3 fw-bold">Security</h6>
            <div class="mb-4">
              <label class="form-label">Change Password</label>
              <input type="password" class="form-control" id="accPassword" placeholder="Leave blank to keep current password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="account.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('token')) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
